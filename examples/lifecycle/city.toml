# Lifecycle — hierarchical pack with deterministic bash agents.
#
# Polecats work in isolated worktrees on feature branches. When done,
# they hand off to the refinery which merges to main. Same lifecycle as
# Gas Town's polecat/refinery, but with bash scripts for reproducible demos.
#
# All agents use start_command (bash scripts) for deterministic,
# reproducible demo recordings.
#
# To use:
#   gc init --from examples/lifecycle ~/demo-city
#   cd ~/demo-city
#   gc start
#
#   # Add a rig (lifecycle pack is included automatically):
#   gc rig add ~/demo-repo
#
#   # Route work to the polecat pool:
#   gc sling demo-repo/polecat "Write hello world"
#   bd show <bead-id> --watch

[workspace]
name = "lifecycle-demo"
start_command = "true"
default_rig_includes = ["packs/lifecycle"]
# No workspace pack — all agents are rig-scoped.
# Rigs inherit the lifecycle pack via default_rig_includes above.

[daemon]
patrol_interval = "10s"
max_restarts = 3
restart_window = "5m"
shutdown_timeout = "5s"
